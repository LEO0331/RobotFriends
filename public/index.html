<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a5f5f" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://robohash.org; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://jsonplaceholder.typicode.com; object-src 'none'; base-uri 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="google-site-verification" content="wT4NszFGw6QkmwmC6ZyjJMiGm-n4AZU3t7JM4Zj2sYg" />
    <meta
      name="description"
      content="RobotFriends helps you search and browse robot profiles quickly."
    />

    <meta property="og:description" content="Search and browse robot profiles instantly." />
    <meta property="og:type" content="website" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="preconnect" href="https://robohash.org" crossorigin />
    <link rel="dns-prefetch" href="//robohash.org" />
    <link rel="preconnect" href="https://jsonplaceholder.typicode.com" crossorigin />
    <link rel="dns-prefetch" href="//jsonplaceholder.typicode.com" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>RobotFriends</title>
  </head>
  <body>

    <div id="root"></div>

  </body>
